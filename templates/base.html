<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} {% endblock %} - LubimyCzytać Projekt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <a href="{{ url_for('index') }}" class="nav-brand">
            <span class="material-symbols-outlined nav-logo-icon">local_library</span>
            Moja Biblioteka
        </a>
        <div class="nav-links">
            <a href="{{ url_for('index') }}">Lista książek</a>
            <a href="{{ url_for('add_book') }}" class="btn-add">
                <span class="material-symbols-outlined btn-icon">add</span>
                Dodaj książkę
            </a>
        </div>
    </nav>
    <div class="container">
        {% for message in get_flashed_messages() %}
            <div class="alert">
                <span class="material-symbols-outlined alert-icon">info</span>
                {{ message }}
            </div>
        {% endfor %}
        {% block content %} {% endblock %}
    </div>
</body>
</html>
