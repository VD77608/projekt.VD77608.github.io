{% extends 'base.html' %}

{% block title %} Lista Książek {% endblock %}

{% block content %}
    <h1>Katalog Książek</h1>
    <div class="books-grid">
        {% for book in books %}
            <div class="book-card">
                <div class="book-card-cover">
                    <span class="material-symbols-outlined book-icon">menu_book</span>
                </div>
                <div class="book-card-info">
                    <h3>{{ book['title'] }}</h3>
                    <p class="author">Autor: <strong>{{ book['author'] }}</strong></p>
                    <a href="{{ url_for('book_details', book_id=book['id']) }}" class="btn-details">Zobacz szczegóły &rarr;</a>
                </div>
            </div>
        {% endfor %}
    </div>
{% endblock %}
